<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Registrasi SAKTI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #1e3c72,
        #2a5298
    );
}

.container{

    width:1000px;
    height:650px;

    background:white;

    border-radius:20px;

    overflow:hidden;

    display:flex;

    box-shadow:
    0 20px 50px rgba(0,0,0,.3);

    animation:fadeUp .8s ease;
}

/* kiri */

.left{

    flex:1;

    background:
    linear-gradient(
        rgba(0,0,0,.4),
        rgba(0,0,0,.4)
    ),
    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');

    background-size:cover;
    background-position:center;

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;

    padding:50px;
}

.left h1{

    font-size:50px;
    margin-bottom:20px;
}

.left p{

    font-size:18px;
    line-height:30px;
}

/* kanan */

.right{

    flex:1;

    padding:50px;
}

.right h2{

    color:#1e3c72;
    margin-bottom:30px;
}

.form-group{

    margin-bottom:20px;
}

.form-group label{

    display:block;
    margin-bottom:8px;

    font-weight:bold;
}

.form-group input{

    width:100%;

    padding:15px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:16px;
}

.form-group input:focus{

    outline:none;

    border:1px solid #0d47a1;

    box-shadow:0 0 8px rgba(13,71,161,.3);
}

button{

    width:100%;

    padding:15px;

    border:none;

    background:#1e3c72;

    color:white;

    border-radius:10px;

    font-size:17px;

    cursor:pointer;

    margin-top:10px;

    transition:.3s;
}

button:hover{

    background:#2a5298;

    transform:translateY(-3px);
}

.login{

    text-align:center;
    margin-top:20px;
}

.login a{

    color:#1e3c72;
    font-weight:bold;
    text-decoration:none;
}
.login a:hover{

    color:#1565c0;
}

@keyframes fadeUp{

    from{

        opacity:0;

        transform:translateY(30px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="left">

        <h1>SAKTI</h1>

        <p>
            Daftarkan akun anda untuk
            menikmati layanan pemesanan
            destinasi wisata Sulawesi Tenggara.
        </p>

    </div>

    <div class="right">

        <h2>Registrasi Pengguna</h2>

         <form action="/register" method="post">

            <div class="form-group">

                <label>Nama Lengkap</label>

                <input
                    type="text"
                    name="nama"
                    placeholder="Masukkan nama">

            </div>

            <div class="form-group">

                <label>Username</label>

                <input
    type="text"
    name="username"
    placeholder="Masukkan username">

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Masukkan password">

            </div>

            <div class="form-group">

                <label>Konfirmasi Password</label>

                <input
                    type="password"
                    name="konfirmasi"
                    placeholder="Ulangi password">

            </div>

            <button>
                DAFTAR
            </button>

            <div class="login">

                Sudah punya akun?

                <a href="/login">
                    Login
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
