<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Detail Destinasi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:#f4f7fb;

}

/* NAVBAR */

.navbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:20px 80px;

    background:#0d47a1;

    color:white;

}

.logo{

    font-size:28px;

    font-weight:bold;

}

.menu a{

    color:white;

    text-decoration:none;

    margin-left:25px;

    font-weight:500;

}

/* CONTENT */

.container{

    width:900px;

    max-width:95%;

    margin:50px auto;

}

.card{

    background:white;

    border-radius:20px;

    padding:40px;

    box-shadow:0 15px 35px rgba(0,0,0,.1);

}

.title{

    text-align:center;

    color:#0d47a1;

    margin-bottom:35px;

}

.icon{

    text-align:center;

    font-size:70px;

    color:#0d47a1;

    margin-bottom:25px;

}

.info{

    display:flex;

    justify-content:space-between;

    border-bottom:1px solid #eee;

    padding:18px 0;

    font-size:18px;

}

.info b{

    color:#555;

}

.button-area{

    margin-top:40px;

    display:flex;

    justify-content:center;

    gap:20px;

}

.btn{

    padding:15px 30px;

    border-radius:10px;

    text-decoration:none;

    color:white;

    font-weight:bold;

    transition:.3s;

}

.btn-pesan{

    background:#0d47a1;

}

.btn-pesan:hover{

    background:#1565c0;

}

.btn-kembali{

    background:#6c757d;

}

.btn-kembali:hover{

    background:#555;

}

/* FOOTER */

.footer{

    margin-top:60px;

    background:#0d47a1;

    color:white;

    text-align:center;

    padding:20px;

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">

SAKTI

</div>

<div class="menu">

<a href="/dashboard">Dashboard</a>

<a href="/destinasi">Destinasi</a>

<a href="/logout">Logout</a>

</div>

</nav>

<div class="container">

<div class="card">

<div class="icon">

<i class="fa-solid fa-map-location-dot"></i>

</div>

<h1 class="title"
    th:text="${destinasi.namaWisata}">
Nama Wisata
</h1>

<div class="info">

<b>ID Wisata</b>

<span th:text="${destinasi.idWisata}">
</span>

</div>

<div class="info">

<b>Lokasi</b>

<span th:text="${destinasi.detail.lokasi}">
</span>

</div>

<div class="info">

<b>Harga Tiket</b>

<span>

Rp
<span th:text="${destinasi.detail.hargaTiket}">
</span>

</span>

</div>

<div class="info">

<b>Jam Operasional</b>

<span th:text="${destinasi.detail.jamOperasional}">
</span>

</div>

<div class="button-area">

<a
th:href="@{/pesan/{id}(id=${destinasi.idWisata})}"
class="btn btn-pesan">

<i class="fa-solid fa-ticket"></i>

Pesan Tiket

</a>

<a
href="/destinasi"
class="btn btn-kembali">

<i class="fa-solid fa-arrow-left"></i>

Kembali

</a>

</div>

</div>

</div>

<footer class="footer">

© 2026 <strong>SAKTI</strong> | Sistem Pemesanan Wisata Sulawesi Tenggara

</footer>

</body>

</html>
