<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>
E-Ticket SAKTI
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;

}

body{

    background:#f4f7fb;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    padding:40px;
}

.ticket{

    width:850px;

    max-width:100%;

    background:white;

    border-radius:22px;

    overflow:hidden;

    box-shadow:0 20px 45px rgba(0,0,0,.12);

    animation:fadeUp .8s;
}

.header{

    background:
    linear-gradient(
        90deg,
        #0d47a1,
        #1976d2);

    color:white;

    padding:35px;
}

.header h1{

    font-size:36px;

    margin-bottom:8px;
}

.header p{

    opacity:.9;
}

.content{

    padding:40px;
}

.row{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:14px 0;

    border-bottom:1px solid #eee;

    font-size:17px;
}

.status{

    background:#d4edda;

    color:#155724;

    padding:8px 20px;

    border-radius:30px;

    font-weight:bold;
}

.qr{

    margin-top:40px;

    text-align:center;
}

.qr h2{

    color:#0d47a1;

    margin-bottom:10px;
}

.qr p{

    color:#666;
}

.download{

    margin-top:40px;

    text-align:center;
}

.download a{

    display:inline-block;

    padding:15px 35px;

    background:#0d47a1;

    color:white;

    border-radius:40px;

    text-decoration:none;

    transition:.3s;
}

.download a:hover{

    background:#1565c0;

    transform:translateY(-3px);
}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">
</head>

<body>

<div class="ticket">

    <div class="header">

        <h1>🎫 SAKTI E-TICKET</h1>

<p>Sistem Pemesanan Wisata Sulawesi Tenggara</p>

    </div>

    <div class="content">

        <div class="row">
            <b>ID Tiket</b>
            <span th:text="${id}"></span>
        </div>

        <div class="row">
            <b>Nama</b>
            <span th:text="${nama}"></span>
        </div>

        <div class="row">
            <b>Destinasi</b>
            <span th:text="${wisata}"></span>
        </div>

        <div class="row">
            <b>Harga</b>
            <span>
                Rp
                <span th:text="${harga}">
                </span>
            </span>
        </div>

        <div class="row">
            <b>Jumlah</b>
            <span th:text="${jumlah}">
            </span>
        </div>

        <div class="row">
            <b>Total</b>
            <span>
                Rp
                <span th:text="${total}">
                </span>
            </span>
        </div>

        <div class="row">
            <b>Status</b>
            <span class="status"
      th:text="${status}">
</span>
        </div>

        <div class="row">
            <b>Tanggal</b>
            <span th:text="${tanggal}">
            </span>
        </div>

        <div class="qr">

<h2>🎟 VALID E-TICKET</h2>

<p>

Silakan tunjukkan tiket ini kepada petugas saat memasuki lokasi wisata.

</p>

</div>

        <div class="download">

            <a
            th:href="@{/report/{id}(id=${id})}">
                Download PDF
            </a>

        </div>

    </div>

</div>

</body>
</html>
