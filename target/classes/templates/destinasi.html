<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Destinasi Wisata</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar">

    <div class="logo">
        SAKTI
    </div>

    <div class="menu">

        <a href="/dashboard">Dashboard</a>

        <a href="/destinasi">Destinasi</a>

        <a href="/logout">Logout</a>

    </div>

</nav>

<!-- ================= HERO ================= -->

<section class="hero">

    <h1>Destinasi Wisata</h1>

    <p>
        Jelajahi destinasi wisata terbaik di Sulawesi Tenggara.
    </p>

    <form action="/destinasi"
          method="get"
          class="search-box">

        <input
                type="text"
                name="keyword"
                th:value="${keyword}"
                placeholder="Cari destinasi wisata...">

        <button type="submit">

            <i class="fa-solid fa-magnifying-glass"></i>

            Cari

        </button>

    </form>

</section>

<!-- ================= DESTINASI ================= -->

<section class="container">

    <div class="card"

         th:each="d : ${destinasi}">

        <div class="icon">

            <i class="fa-solid fa-map-location-dot"></i>

        </div>

        <h2 th:text="${d.namaWisata}">
            Nama Wisata
        </h2>

        <p>

            <i class="fa-solid fa-location-dot"></i>

            <span th:text="${d.detail.lokasi}">
                Lokasi
            </span>

        </p>

        <p>

            <i class="fa-solid fa-money-bill-wave"></i>

            Rp
            <span th:text="${d.detail.hargaTiket}">
                20000
            </span>

        </p>

        <p>

            <i class="fa-solid fa-clock"></i>

            <span th:text="${d.detail.jamOperasional}">
                08.00 - 17.00
            </span>

        </p>

        <a
           th:href="@{/destinasi/{id}(id=${d.idWisata})}">

            <i class="fa-solid fa-eye"></i>

            Lihat Detail

        </a>

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    © 2026 <strong>SAKTI</strong>

    <br>

    Sistem Pemesanan Wisata Sulawesi Tenggara

</footer>

</body>

</html>
